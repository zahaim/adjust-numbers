name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for npm provenance (Trusted Publishing)

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter react-native-adjust-numbers build

      - name: Publish (with provenance)
        run: pnpm --filter react-native-adjust-numbers publish --access public --no-git-checks --provenance
